<!DOCTYPE html>
{% load static %}
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход</title>
  <link rel="stylesheet" href="{% static 'bootstrap/css/bootstrap.min.css' %}">
  <style>
    .bg-dark a:hover {
      opacity: 0.7;
    }
  </style>
</head>

<body class="bg-light">

  <!-- Header -->
  {% include "includes/header.html" %}

  <div class="container py-4">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">

        <div class="card border rounded-4 shadow-sm">
          <div class="card-body p-4">

            <h2 class="card-title text-center mb-4">Вход</h2>
            
            {% if messages %}
              {% for message in messages %}
                {% if message.tags == 'error' %}
                  <div class="alert alert-danger alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                  </div>
                {% endif %}
              {% endfor %}
            {% endif %}

            <form method="post">
              {% csrf_token %}

              <div class="mb-3">
                <label for="username" class="form-label">Логин:</label>
                <input type="text" name="username" id="username" class="form-control rounded-3" required>
              </div>

              <div class="mb-4">
                <label for="password" class="form-label">Пароль:</label>
                <input type="password" name="password" id="password" class="form-control rounded-3" required>
              </div>

              <div class="d-grid gap-2">
                <button type="submit" class="btn btn-dark rounded-pill py-2">
                  Войти
                </button>
              </div>
            </form>

            <div class="mt-4 text-center">
              <p class="mb-1">Нет аккаунта? <a href="{% url 'users:register' %}" class="text-dark">Зарегистрироваться</a></p>
              <p class="mt-2"><a href="{% url 'homepage:book_list' %}" class="text-secondary">На главную</a></p>
            </div>

          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="{% static 'bootstrap/js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
