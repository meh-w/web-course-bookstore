<div class="bg-dark text-white border-bottom">
  <div class="container py-3 d-flex justify-content-between align-items-center">
    <a href="{% url 'homepage:book_list' %}" class="text-white text-decoration-none">
      <div class="fw-semibold fs-4">Bookstore</div>
    </a>
    
    <div>
      {% if user.is_authenticated %}
        <span class="text-white-50 me-3">{{ user.username }}</span>
        <a href="{% url 'users:logout' %}" class="btn btn-outline-light btn-sm rounded-pill px-3">
          Выйти
        </a>
      {% else %}
        <a href="{% url 'users:login' %}" class="btn btn-outline-light btn-sm rounded-pill px-3 me-2">
          Войти
        </a>
        <a href="{% url 'users:register' %}" class="btn btn-light btn-sm rounded-pill px-3">
          Регистрация
        </a>
      {% endif %}
    </div>
  </div>
</div>
