<h2 class="h4 mb-4">{{ title }}</h2>

<form method="POST">
  {% csrf_token %}

  <div class="mb-3">
    <label class="form-label fw-semibold">Название</label>
    <input type="text" name="title" class="form-control rounded-3" value="{{ book.title|default:'' }}" required>
  </div>

  <div class="mb-3">
    <label class="form-label fw-semibold">Автор</label>
    <input type="text" name="author" class="form-control rounded-3" value="{{ book.author|default:'' }}" required>
  </div>

  <div class="mb-3">
    <label class="form-label fw-semibold">Цена</label>
    <input type="number" name="price" class="form-control rounded-3" value="{{ book.price|default:'' }}" required>
  </div>

  <div class="mb-3">
    <label class="form-label fw-semibold">Жанр</label>
    <input type="text" name="genre" class="form-control rounded-3" value="{{ book.genre|default:'' }}">
    <div class="form-text text-muted small">Необязательное поле</div>
  </div>

  <div class="mb-4">
    <label class="form-label fw-semibold">Год публикации</label>
    <input type="number" name="publication_year" class="form-control rounded-3" value="{{ book.publication_year|default:'' }}">
    <div class="form-text text-muted small">Необязательное поле</div>
  </div>

  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-dark rounded-pill px-4">{{ submit_text }}</button>
    <a href="{% url 'homepage:book_list' %}" class="btn btn-light border rounded-pill px-4">Отмена</a>
  </div>
</form>
