services:
  db:
    image: mysql:8.0
    container_name: bookstore_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: bookstore_db
      MYSQL_USER: bookstore_user
      MYSQL_PASSWORD: bookstore_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./bookstore
      dockerfile: Dockerfile
    container_name: bookstore_web
    command: >
      sh -c "
      echo 'Waiting for MySQL...' &&
      while ! nc -z db 3306; do
        sleep 1;
      done;
      echo 'MySQL ready!' &&
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      gunicorn bookstore.wsgi:application --bind 0.0.0.0:8000
      "
    volumes:
      - ./bookstore:/app
    depends_on:
      db:
        condition: service_healthy
    environment:
      - IN_DOCKER=1
      - DB_NAME=bookstore_db
      - DB_USER=bookstore_user
      - DB_PASSWORD=bookstore_pass
      - DB_HOST=db
      - DB_PORT=3306

  nginx:
    image: nginx:latest
    container_name: bookstore_nginx
    ports:
      - "8000:80"
    volumes:
      - ./bookstore/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./bookstore/staticfiles:/app/staticfiles
      - ./bookstore/media:/app/media
    depends_on:
      - web

volumes:
  mysql_data: